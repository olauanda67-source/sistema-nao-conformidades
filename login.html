<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Não Conformidades</title>
</head>
<body>

<h2>Login do Sistema</h2>

<div id="login">
    <label>Usuário:</label><br>
    <input type="text" id="usuario"><br><br>

    <label>Senha:</label><br>
    <input type="password" id="senha"><br><br>

    <button onclick="validarLogin()">Entrar</button>
</div>

<!-- DASHBOARD ESCONDIDO -->
<div id="dashboard" style="display:none;">
    <h2>Bem-vindo ao Sistema</h2>
    <p>Área de gerenciamento de não conformidades</p>

    <button onclick="mostrarCadastro()">Registrar Não Conformidade</button>
</div>

<!-- CADASTRO ESCONDIDO -->
<div id="cadastro" style="display:none;">
    <h2>Cadastro de Não Conformidade</h2>

    <label>Descrição:</label><br>
    <input type="text"><br><br>

    <label>Setor:</label><br>
    <input type="text"><br><br>

    <button onclick="alert('Salvo com sucesso!')">Salvar</button>
</div>

<script>
function validarLogin() {
    var user = document.getElementById("usuario").value;
    var senha = document.getElementById("senha").value;

    if(user === "admin" && senha === "123") {
        document.getElementById("login").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        alert("Usuário ou senha incorretos!");
    }
}

function mostrarCadastro() {
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("cadastro").style.display = "block";
}
</script>

</body>
</html>
