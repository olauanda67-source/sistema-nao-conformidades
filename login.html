<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Login</title>

<style>

body{

background:#e9ecef;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.caixa{

background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0px 0px 10px gray;

}

h2{

text-align:center;

}

input{

width:100%;
padding:10px;
margin-top:10px;

}

button{

width:100%;
padding:10px;
margin-top:15px;
background:blue;
color:white;
border:none;

}

p{

text-align:center;

}

</style>

</head>

<body>

<div class="caixa">

<h2>Sistema de Login</h2>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">

Entrar

</button>

<p id="mensagem"></p>

</div>

<script>

function login(){

let usuario =
document.getElementById("usuario").value;

let senha =
document.getElementById("senha").value;

if(usuario == "admin" && senha == "123"){

document.getElementById("mensagem").innerHTML =
"Login realizado com sucesso!";

}else{

document.getElementById("mensagem").innerHTML =
"Usuário ou senha incorretos!";

}

}

</script>

</body>

</html>
