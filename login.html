<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Não Conformidades</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f0f2f5;
            text-align: center;
            margin-top: 50px;
        }

        .container{
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 5px;
        }

        button{
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background-color: #0056b3;
        }

        table{
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td{
            border: 1px solid gray;
            padding: 10px;
        }

        th{
            background-color: #007bff;
            color: white;
        }
    </style>
</head>

<body>

<div class="container" id="login">
    <h2>Login do Sistema</h2>

    <input type="text" id="usuario" placeholder="Usuário"><br>

    <input type="password" id="senha" placeholder="Senha"><br><br>

    <button onclick="validarLogin()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <h2>Bem-vindo ao Sistema</h2>

    <button onclick="mostrarCadastro()">
        Registrar Não Conformidade
    </button>

    <div id="cadastro" style="display:none; margin-top:20px;">

        <h3>Cadastro de Não Conformidade</h3>

        <input type="text" id="descricao" placeholder="Descrição"><br>

        <input type="text" id="setor" placeholder="Setor"><br><br>

        <button onclick="salvarOcorrencia()">Salvar</button>

    </div>

    <!-- TABELA -->
    <table id="tabela" style="display:none;">
        <tr>
            <th>Descrição</th>
            <th>Setor</th>
            <th>Status</th>
        </tr>
    </table>

</div>

<script>

function validarLogin(){

    var user = document.getElementById("usuario").value;
    var senha = document.getElementById("senha").value;

    if(user == "admin" && senha == "123"){

        document.getElementById("login").style.display = "none";

        document.getElementById("dashboard").style.display = "block";

    }else{

        alert("Usuário ou senha incorretos!");

    }
}

function mostrarCadastro(){

    document.getElementById("cadastro").style.display = "block";

}

function salvarOcorrencia(){

    var descricao = document.getElementById("descricao").value;

    var setor = document.getElementById("setor").value;

    var tabela = document.getElementById("tabela");

    tabela.style.display = "table";

    var linha = tabela.insertRow();

    linha.insertCell(0).innerHTML = descricao;

    linha.insertCell(1).innerHTML = setor;

    linha.insertCell(2).innerHTML = "Aberto";

    alert("Não conformidade registrada com sucesso!");

}
</script>

</body>
</html>
