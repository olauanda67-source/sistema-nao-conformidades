<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
font-family: Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:300px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

#mensagem{
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema de Não Conformidades</h2>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<p id="mensagem"></p>

</div>

<script>

function login(){

let usuario =
document.getElementById("usuario").value;

let senha =
document.getElementById("senha").value;

if(usuario == "admin" && senha == "123"){

document.getElementById("mensagem").innerHTML =
"Login realizado com sucesso!";

}else{

document.getElementById("mensagem").innerHTML =
"Usuário ou senha incorretos!";

}

}

</script>

</body>

</html>
