<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(to right,#0d6efd,#4e73df);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.login-box{

background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0px 0px 20px rgba(0,0,0,0.2);

}

.titulo{
text-align:center;
margin-bottom:25px;
font-weight:bold;
color:#0d6efd;
}

</style>

</head>

<body>

<div class="login-box">

<h2 class="titulo">
Sistema de Não Conformidades
</h2>

<input type="text"
id="usuario"
class="form-control mb-3"
placeholder="Usuário">

<input type="password"
id="senha"
class="form-control mb-3"
placeholder="Senha">

<button onclick="login()"
class="btn btn-primary w-100">
Entrar
</button>

<p id="mensagem"
class="text-center mt-3">
</p>

</div>

<script>

function login(){

let usuario =
document.getElementById("usuario").value;

let senha =
document.getElementById("senha").value;

if(usuario == "admin" && senha == "123"){

document.getElementById("mensagem").innerHTML =
"Login realizado com sucesso!";

}else{

document.getElementById("mensagem").innerHTML =
"Usuário ou senha incorretos!";

}

}

</script>

</body>

</html>
